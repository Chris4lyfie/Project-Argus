[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
;upload_speed = 115200                 ;slowin down baud rate! used for flashing firmware to the cihp
monitor_speed = 460800                ;monitor speed just so I can see what's happening, has to match the baud rate I set when I setup the board


lib_deps =
    arduino-libraries/Ethernet        ; W5500 TCP/IP
    paulstoffregen/OneWire            ; 1-Wire bus
    milesburton/DallasTemperature     ; DS18B20
    adafruit/Adafruit SHT31 Library   ; SHT31 humidity/temp
    adafruit/Adafruit BusIO           ; Library dependancies?
